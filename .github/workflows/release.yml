name: Release

on:
  push:
    branches:
      - master
      - release/beta
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Determinar versión y crear el GitHub Release vacío
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Semantic-release (versión + tag + release)
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semrel.outputs.new_release_published }}
      new_release_version: ${{ steps.semrel.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semrel.outputs.new_release_git_tag }}
      new_release_channel: ${{ steps.semrel.outputs.new_release_channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        # --omit=optional skip canvas (transitive de pdfjs-dist@optionalDependencies).
        # canvas intenta compilar cairo y rompe en ambos OS porque no tenemos los
        # headers nativos. El codigo usa @napi-rs/canvas (prebuilt napi binary)
        # que monkey-patchea CanvasFactory de pdfjs, asi que canvas nativo no
        # hace falta.
        run: npm ci --legacy-peer-deps --omit=optional --no-audit --no-fund

      - name: Run semantic-release
        id: semrel
        run: |
          npx semantic-release
          # Capturar outputs (semantic-release v22 no emite outputs nativos a GH Actions)
          if git tag --points-at HEAD | grep -q '^v'; then
            TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
            VERSION=${TAG#v}
            CHANNEL=stable
            [[ "$VERSION" == *-beta* ]] && CHANNEL=beta
            [[ "$VERSION" == *-alpha* ]] && CHANNEL=alpha
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "new_release_git_tag=$TAG" >> $GITHUB_OUTPUT
            echo "new_release_channel=$CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Release output" >> $GITHUB_STEP_SUMMARY
          echo "- published: ${{ steps.semrel.outputs.new_release_published }}" >> $GITHUB_STEP_SUMMARY
          echo "- version: ${{ steps.semrel.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- channel: ${{ steps.semrel.outputs.new_release_channel }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build matrix: empaquetar instaladores y subirlos al release
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Checkout exacto al tag que semantic-release acaba de crear — evita race
      # condition entre matrix runners (ambos haciendo pull del bump commit).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_release_git_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Patch package.json version
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          # semantic-release crea solo tag + GitHub release (no pushea bump
          # commit a master). package.json en el tag aun tiene la version vieja.
          # Patcheamos in-place; electron-builder lee version desde package.json.
          node -e "
            const fs=require('fs');
            const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version='${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)+'\n');
          "
          echo "package.json bumped a ${VERSION}"

      - name: Install deps
        # --omit=optional skip canvas (transitive de pdfjs-dist@optionalDependencies).
        # canvas intenta compilar cairo y rompe en ambos OS porque no tenemos los
        # headers nativos. El codigo usa @napi-rs/canvas (prebuilt napi binary)
        # que monkey-patchea CanvasFactory de pdfjs, asi que canvas nativo no
        # hace falta.
        run: npm ci --legacy-peer-deps --omit=optional --no-audit --no-fund

      - name: Build app
        run: npm run build:prod
        env:
          NODE_OPTIONS: --max_old_space_size=8192

      # F0 (SignPath): si SIGNPATH_API_TOKEN esta configurado, separamos build
      # vs publish para poder firmar el .exe entre medio. Si no, mantenemos el
      # publish-always tradicional. Detectamos en un step temprano y bifurcamos.
      - name: Detect SignPath availability (Windows only)
        id: signpath
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          if [ -n "${SIGNPATH_API_TOKEN}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "[signpath] secret detectado, flujo de firma activado."
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "[signpath] secret no configurado, fallback a publish unsigned."
          fi

      # Path A — sin SignPath (linux siempre, windows cuando no hay token)
      - name: Build & publish installer (unsigned)
        if: matrix.os != 'windows-latest' || steps.signpath.outputs.enabled != 'true'
        shell: bash
        run: |
          if [ -z "${CSC_LINK}" ]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
          npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # Path B — con SignPath (solo Windows). Flujo: build sin publish → upload
      # artifact a Actions → SignPath descarga, firma, sube de vuelta → regenerar
      # latest.yml/alpha.yml/beta.yml con el sha512 del .exe firmado → publish
      # final via gh release upload.
      - name: Package installer (windows, no publish)
        if: matrix.os == 'windows-latest' && steps.signpath.outputs.enabled == 'true'
        shell: bash
        run: |
          if [ -z "${CSC_LINK}" ]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
          npx electron-builder --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload unsigned exe to Actions artifacts (for SignPath)
        if: matrix.os == 'windows-latest' && steps.signpath.outputs.enabled == 'true'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: release/*.exe
          retention-days: 1

      - name: Sign Windows installer with SignPath
        if: matrix.os == 'windows-latest' && steps.signpath.outputs.enabled == 'true'
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release/

      - name: Regenerate updater manifests with signed exe hash
        if: matrix.os == 'windows-latest' && steps.signpath.outputs.enabled == 'true'
        shell: bash
        run: node scripts/regenerate-updater-manifest.js

      - name: Publish signed Windows assets to GitHub Release
        if: matrix.os == 'windows-latest' && steps.signpath.outputs.enabled == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.new_release_git_tag }}
        run: |
          cd release
          ASSETS=$(find . -maxdepth 1 -type f \( -name "*.exe" -o -name "*.yml" -o -name "*.blockmap" \))
          echo "Subiendo: $ASSETS"
          gh release upload "$TAG" $ASSETS --clobber

      - name: Upload installers as workflow artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/latest*.yml
            release/alpha*.yml
            release/beta*.yml
          if-no-files-found: ignore
          retention-days: 14
