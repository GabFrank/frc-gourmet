name: Release

on:
  push:
    branches:
      - master
      - release/beta
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Determinar versión y crear el GitHub Release vacío
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Semantic-release (versión + tag + release)
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semrel.outputs.new_release_published }}
      new_release_version: ${{ steps.semrel.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semrel.outputs.new_release_git_tag }}
      new_release_channel: ${{ steps.semrel.outputs.new_release_channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        # --omit=optional skip canvas (transitive de pdfjs-dist@optionalDependencies).
        # canvas intenta compilar cairo y rompe en ambos OS porque no tenemos los
        # headers nativos. El codigo usa @napi-rs/canvas (prebuilt napi binary)
        # que monkey-patchea CanvasFactory de pdfjs, asi que canvas nativo no
        # hace falta.
        run: npm ci --legacy-peer-deps --omit=optional --no-audit --no-fund

      - name: Run semantic-release
        id: semrel
        run: |
          npx semantic-release
          # Capturar outputs (semantic-release v22 no emite outputs nativos a GH Actions)
          if git tag --points-at HEAD | grep -q '^v'; then
            TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
            VERSION=${TAG#v}
            CHANNEL=stable
            [[ "$VERSION" == *-beta* ]] && CHANNEL=beta
            [[ "$VERSION" == *-alpha* ]] && CHANNEL=alpha
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "new_release_git_tag=$TAG" >> $GITHUB_OUTPUT
            echo "new_release_channel=$CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Release output" >> $GITHUB_STEP_SUMMARY
          echo "- published: ${{ steps.semrel.outputs.new_release_published }}" >> $GITHUB_STEP_SUMMARY
          echo "- version: ${{ steps.semrel.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- channel: ${{ steps.semrel.outputs.new_release_channel }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build matrix: empaquetar instaladores y subirlos al release
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Checkout exacto al tag que semantic-release acaba de crear — evita race
      # condition entre matrix runners (ambos haciendo pull del bump commit).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_release_git_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Patch package.json version
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          # semantic-release crea solo tag + GitHub release (no pushea bump
          # commit a master). package.json en el tag aun tiene la version vieja.
          # Patcheamos in-place; electron-builder lee version desde package.json.
          node -e "
            const fs=require('fs');
            const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version='${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)+'\n');
          "
          echo "package.json bumped a ${VERSION}"

      - name: Install deps
        # --omit=optional skip canvas (transitive de pdfjs-dist@optionalDependencies).
        # canvas intenta compilar cairo y rompe en ambos OS porque no tenemos los
        # headers nativos. El codigo usa @napi-rs/canvas (prebuilt napi binary)
        # que monkey-patchea CanvasFactory de pdfjs, asi que canvas nativo no
        # hace falta.
        run: npm ci --legacy-peer-deps --omit=optional --no-audit --no-fund

      - name: Build app
        run: npm run build:prod
        env:
          NODE_OPTIONS: --max_old_space_size=8192

      - name: Build & publish installer
        # CSC_LINK/CSC_KEY_PASSWORD se setean siempre via env: (GH Actions no
        # soporta condicionales en env). Si los secrets estan vacios, electron-builder
        # interpreta string vacio como path invalido. Los unseteamos en bash si vacios.
        # Sin certs el .exe sale unsigned (SmartScreen warning una vez).
        shell: bash
        run: |
          if [ -z "${CSC_LINK}" ]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
          npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload installers as workflow artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/latest*.yml
            release/alpha*.yml
            release/beta*.yml
          if-no-files-found: ignore
          retention-days: 14
