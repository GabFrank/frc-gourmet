<main class="cambiar">
  <form class="cambiar-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1 class="brand">FRC Gourmet</h1>
    <p class="subtitle">Cambiá tu contraseña temporal</p>
    <p class="hint">
      Por seguridad, tenés que reemplazar la contraseña temporal por una personal
      antes de continuar.
    </p>

    <label class="field">
      <span class="field-label">Contraseña actual (temporal)</span>
      <input type="password" formControlName="currentPassword" autocomplete="current-password"
             inputmode="numeric" />
    </label>

    <label class="field">
      <span class="field-label">Nueva contraseña</span>
      <input type="password" formControlName="newPassword" autocomplete="new-password" />
      <span class="field-error"
            *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('minlength')">
        Debe tener al menos 6 caracteres.
      </span>
    </label>

    <label class="field">
      <span class="field-label">Repetir nueva contraseña</span>
      <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
    </label>

    <p class="error" *ngIf="form.touched && form.hasError('noCoincide')">
      Las contraseñas no coinciden.
    </p>
    <p class="error" *ngIf="form.touched && form.hasError('igualAActual')">
      La nueva contraseña debe ser distinta a la temporal.
    </p>
    <p class="error" *ngIf="error">{{ error }}</p>

    <button type="submit" class="submit" [disabled]="loading">
      {{ loading ? 'Guardando…' : 'Cambiar contraseña' }}
    </button>

    <button type="button" class="logout" (click)="cerrarSesion()" [disabled]="loading">
      Cerrar sesión
    </button>
  </form>
</main>
