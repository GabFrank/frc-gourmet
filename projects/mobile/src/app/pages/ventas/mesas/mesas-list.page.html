<div class="crud-page">
  <!-- Tabs MESAS / COMANDAS (como el PdV) -->
  <div class="vista-tabs">
    <button
      class="vista-tab"
      mat-ripple
      [class.sel]="vista === 'mesas'"
      (click)="seleccionarVista('mesas')"
    >
      <mat-icon>table_restaurant</mat-icon> Mesas
    </button>
    <button
      class="vista-tab"
      mat-ripple
      [class.sel]="vista === 'comandas'"
      (click)="seleccionarVista('comandas')"
    >
      <mat-icon>receipt_long</mat-icon> Comandas
    </button>
  </div>

  <!-- Filtro por sector + resumen (compartido por ambas vistas) -->
  <div class="mesas-filtros" *ngIf="!loading && !error">
    <div class="mesas-resumen">
      <span>{{ ocupadas }}/{{ totalMesas }} ocupadas</span>
      <button class="mesas-refresh" mat-ripple (click)="recargar()" aria-label="Recargar">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>
    <div class="mesas-chips">
      <button class="mesas-chip" mat-ripple [class.sel]="sectorSeleccionado === null"
              (click)="seleccionarSector(null)">Todos</button>
      <button class="mesas-chip" mat-ripple *ngFor="let s of sectores"
              [class.sel]="sectorSeleccionado === s.id"
              (click)="seleccionarSector(s.id)">{{ s.nombre }}</button>
    </div>
  </div>

  <mat-progress-bar *ngIf="loading || abriendo" mode="indeterminate"></mat-progress-bar>
  <p *ngIf="error" class="crud-error">{{ error }}</p>

  <!-- Vista MESAS -->
  <div class="mesas-grid" *ngIf="!loading && !error && vista === 'mesas'">
    <a
      *ngFor="let m of items"
      class="mesa-card-grid"
      [class.ocupada]="m.ocupada"
      mat-ripple
      [routerLink]="['/ventas/mesas', m.id]"
    >
      <div class="mesa-card-top">
        <span class="mesa-card-num">{{ m.numero }}</span>
        <span class="mesa-card-estado" [class.off]="!m.ocupada">{{ m.estado }}</span>
      </div>
      <div class="mesa-card-info">
        <span class="mesa-card-line" *ngIf="m.sectorNombre">
          <mat-icon>place</mat-icon>{{ m.sectorNombre }}
        </span>
        <span class="mesa-card-line" *ngIf="m.capacidad">
          <mat-icon>group</mat-icon>{{ m.capacidad }}
        </span>
        <span class="mesa-card-line" *ngIf="m.comandas > 0">
          <mat-icon>receipt_long</mat-icon>{{ m.comandas }} comanda(s)
        </span>
      </div>
    </a>

    <p *ngIf="items.length === 0" class="crud-empty">No hay mesas en este sector.</p>
  </div>

  <!-- Vista COMANDAS -->
  <div class="mesas-grid" *ngIf="!loading && !error && vista === 'comandas'">
    <button
      *ngFor="let c of comandas"
      class="mesa-card-grid"
      [class.ocupada]="c.ocupada"
      mat-ripple
      [disabled]="abriendo"
      (click)="tocarComanda(c)"
    >
      <div class="mesa-card-top">
        <span class="mesa-card-num">#{{ c.numero }}</span>
        <span class="mesa-card-estado" [class.off]="!c.ocupada">{{ c.estado }}</span>
      </div>
      <div class="mesa-card-info">
        <span class="mesa-card-line" *ngIf="c.sectorNombre">
          <mat-icon>place</mat-icon>{{ c.sectorNombre }}
        </span>
        <span class="mesa-card-line" *ngIf="c.observacion">
          <mat-icon>sticky_note_2</mat-icon>{{ c.observacion }}
        </span>
      </div>
    </button>

    <p *ngIf="comandas.length === 0" class="crud-empty">No hay comandas en este sector.</p>
  </div>
</div>
