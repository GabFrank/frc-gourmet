<div class="crud-page">
  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>
  <p *ngIf="error" class="crud-error">{{ error }}</p>

  <div class="crud-list" *ngIf="!loading && !error">
    <mat-card *ngFor="let c of items" class="crud-card" appearance="outlined">
      <div class="crud-card-body">
        <div class="crud-card-main">
          <span class="crud-name">{{ c.clienteNombre }}</span>
          <span class="crud-sub" *ngIf="c.descripcion">{{ c.descripcion }}</span>
          <span class="crud-sub">Total: {{ c.montoTotal | number: '1.0-2' }}</span>
        </div>
        <span class="crud-chip" [class.warn]="c.saldo > 0" [class.off]="c.saldo <= 0">
          Saldo {{ c.saldo | number: '1.0-2' }}
        </span>
      </div>
    </mat-card>
    <p *ngIf="items.length === 0" class="crud-empty">No hay cuentas por cobrar.</p>
  </div>
</div>
