<div class="crud-edit">
  <mat-toolbar color="primary" class="crud-edit-bar">
    <button mat-icon-button (click)="volver()" aria-label="Volver"><mat-icon>arrow_back</mat-icon></button>
    <span class="crud-edit-title">{{ esNuevo ? 'Nuevo usuario' : 'Editar usuario' }}</span>
    <span class="crud-spacer"></span>
    <button mat-button (click)="guardar()" [disabled]="saving">Guardar</button>
  </mat-toolbar>

  <mat-progress-bar *ngIf="loading || saving" mode="indeterminate"></mat-progress-bar>

  <form class="crud-form" [formGroup]="form" (ngSubmit)="guardar()">
    <mat-form-field appearance="outline">
      <mat-label>Usuario (nickname)</mat-label>
      <input matInput formControlName="nickname" autocapitalize="none" autocorrect="off" />
      <mat-error *ngIf="form.controls.nickname.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="esNuevo">
      <mat-label>Contraseña</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="new-password" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Persona (opcional)</mat-label>
      <mat-select formControlName="personaId">
        <mat-option [value]="null">— Sin persona —</mat-option>
        <mat-option *ngFor="let p of personas" [value]="p.id">{{ p.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Roles</mat-label>
      <mat-select formControlName="roleIds" multiple>
        <mat-option *ngFor="let r of roles" [value]="r.id">{{ r.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>

    <button type="submit" mat-flat-button color="primary" class="crud-save-btn" [disabled]="saving">
      {{ saving ? 'Guardando…' : 'Guardar' }}
    </button>
  </form>
</div>
