<div class="edit">
  <mat-toolbar color="primary" class="edit-bar">
    <button mat-icon-button (click)="volver()" aria-label="Volver">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span class="edit-title">{{ esNuevo ? 'Nuevo cargo' : 'Editar cargo' }}</span>
    <span class="spacer"></span>
    <button mat-button (click)="guardar()" [disabled]="saving">Guardar</button>
  </mat-toolbar>

  <mat-progress-bar *ngIf="loading || saving" mode="indeterminate"></mat-progress-bar>

  <form class="form" [formGroup]="form" (ngSubmit)="guardar()">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" autocapitalize="characters" />
      <mat-error *ngIf="form.controls.nombre.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Salario de referencia</mat-label>
      <input matInput type="number" inputmode="numeric" formControlName="salarioReferencia" />
    </mat-form-field>

    <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>

    <button type="submit" mat-flat-button color="primary" class="save-btn" [disabled]="saving">
      {{ saving ? 'Guardando…' : 'Guardar' }}
    </button>
  </form>
</div>
