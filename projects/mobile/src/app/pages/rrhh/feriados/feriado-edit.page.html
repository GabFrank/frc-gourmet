<div class="crud-edit">
  <mat-toolbar color="primary" class="crud-edit-bar">
    <button mat-icon-button (click)="volver()" aria-label="Volver"><mat-icon>arrow_back</mat-icon></button>
    <span class="crud-edit-title">{{ esNuevo ? 'Nuevo feriado' : 'Editar feriado' }}</span>
    <span class="crud-spacer"></span>
    <button mat-button (click)="guardar()" [disabled]="saving">Guardar</button>
  </mat-toolbar>

  <mat-progress-bar *ngIf="loading || saving" mode="indeterminate"></mat-progress-bar>

  <form class="crud-form" [formGroup]="form" (ngSubmit)="guardar()">
    <mat-form-field appearance="outline">
      <mat-label>Fecha</mat-label>
      <input matInput type="date" formControlName="fecha" />
      <mat-error *ngIf="form.controls.fecha.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="descripcion" autocapitalize="characters" />
      <mat-error *ngIf="form.controls.descripcion.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Recargo (%)</mat-label>
      <input matInput type="number" inputmode="numeric" formControlName="recargoPorcentaje" />
    </mat-form-field>

    <mat-slide-toggle formControlName="esNacional" color="primary">Feriado nacional</mat-slide-toggle>
    <mat-slide-toggle formControlName="activo" color="primary">Activo</mat-slide-toggle>

    <button type="submit" mat-flat-button color="primary" class="crud-save-btn" [disabled]="saving">
      {{ saving ? 'Guardando…' : 'Guardar' }}
    </button>
  </form>
</div>
