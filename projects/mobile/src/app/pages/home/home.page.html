<div class="home">
  <header class="greeting">
    <h2>Hola{{ user ? ', ' + user.nickname : '' }}</h2>
    <p>Panel administrativo</p>
  </header>

  <section class="quick">
    <a *ngFor="let a of accesos" class="quick-card" [routerLink]="a.path">
      <mat-icon>{{ a.icon }}</mat-icon>
      <span>{{ a.label }}</span>
    </a>
  </section>
</div>
