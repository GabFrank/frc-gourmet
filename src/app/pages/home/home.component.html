<div class="dashboard-container">
  <h2 class="dashboard-title">Accesos rapidos</h2>

  <div class="accesos-grid">
    <mat-card *ngFor="let acceso of accesosRapidos"
              class="acceso-card"
              (click)="abrir(acceso)"
              [ngStyle]="{'border-left': '4px solid ' + acceso.color}">
      <mat-card-header>
        <div mat-card-avatar class="acceso-icon" [ngStyle]="{'background-color': acceso.color}">
          <mat-icon>{{acceso.icono}}</mat-icon>
        </div>
        <mat-card-title>{{acceso.titulo}}</mat-card-title>
        <mat-card-subtitle>{{acceso.descripcion}}</mat-card-subtitle>
      </mat-card-header>
    </mat-card>
  </div>

  <!-- Accesos directos personalizados -->
  <ng-container *ngIf="shortcuts.length > 0">
    <h3 class="section-subtitle">Mis accesos directos</h3>
    <div class="shortcuts-grid">
      <mat-card *ngFor="let s of shortcuts"
                class="shortcut-card"
                [ngStyle]="{'border-left': '4px solid ' + s.color}"
                (click)="abrirShortcut(s)">
        <div class="shortcut-row">
          <div class="shortcut-icon" [ngStyle]="{'background-color': s.color}">
            <mat-icon>{{s.icono}}</mat-icon>
          </div>
          <span class="shortcut-titulo">{{s.titulo}}</span>
          <button mat-icon-button class="shortcut-delete" (click)="eliminarShortcut(s, $event)" matTooltip="Eliminar">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </mat-card>
    </div>
  </ng-container>
</div>
