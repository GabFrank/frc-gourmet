<div class="dashboard-container">
  <h1 class="dashboard-title">Caja Mayor</h1>

  <!-- Accesos directos personalizados -->
  <div *ngIf="shortcuts.length > 0" class="shortcuts-section">
    <h3 class="section-subtitle">Accesos directos</h3>
    <div class="shortcuts-grid">
      <mat-card *ngFor="let s of shortcuts"
                class="shortcut-card"
                [ngStyle]="{'border-left': '4px solid ' + s.color}"
                (click)="abrirShortcut(s)">
        <div class="shortcut-row">
          <div class="shortcut-icon" [ngStyle]="{'background-color': s.color}">
            <mat-icon>{{s.icono}}</mat-icon>
          </div>
          <span class="shortcut-titulo">{{s.titulo}}</span>
          <button mat-icon-button class="shortcut-delete" (click)="eliminarShortcut(s, $event)" matTooltip="Eliminar">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </mat-card>
    </div>
  </div>

  <div class="dashboard-grid">
    <mat-card *ngFor="let item of dashboardItems"
              class="dashboard-card"
              (click)="navigateTo(item.route)"
              [ngStyle]="{'border-top': '4px solid ' + item.color}">
      <mat-card-header>
        <div mat-card-avatar class="card-icon" [ngStyle]="{'background-color': item.color}">
          <mat-icon>{{item.icon}}</mat-icon>
        </div>
        <mat-card-title>{{item.title}}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>{{item.description}}</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary">ABRIR</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
