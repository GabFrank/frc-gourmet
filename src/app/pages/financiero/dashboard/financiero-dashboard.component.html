<div class="dashboard-container">

  <div class="dashboard-header">
    <div class="dashboard-header-title">
      <h1 class="dashboard-title">Financiero</h1>
      <span class="dashboard-subtitle">Configuracion y monitoreo</span>
    </div>
    <div class="dashboard-header-actions">
      <button mat-icon-button (click)="cargarKpis()" [disabled]="loading" matTooltip="Actualizar">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>
  </div>

  <div class="dashboard-stats-row">
    <app-dash-stat-chip
      icon="point_of_sale"
      [value]="cajasActivas"
      label="Cajas abiertas"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="monetization_on"
      [value]="monedasActivas"
      label="Monedas activas"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="attach_money"
      color="success"
      [value]="formatPYG(cotizacionUSD)"
      label="USD / PYG"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="devices"
      [value]="dispositivosPdv"
      label="Dispositivos PdV"
      [loading]="loading">
    </app-dash-stat-chip>
  </div>

  <div class="dashboard-quick-actions">
    <app-dash-quick-action *ngFor="let a of quickActions"
      [icon]="a.icon"
      [title]="a.title"
      [color]="a.color"
      (action)="navigateTo(a.action)">
    </app-dash-quick-action>
  </div>

  <!-- Shortcuts personalizados -->
  <div class="dashboard-card" *ngIf="shortcuts.length > 0">
    <app-dash-section-header
      icon="bookmarks"
      title="Mis accesos directos"
      [badge]="shortcuts.length"
      badgeColor="info">
    </app-dash-section-header>
    <mat-divider></mat-divider>
    <div class="shortcuts-grid">
      <div *ngFor="let s of shortcuts"
           class="shortcut-card"
           [style.border-left-color]="s.color"
           (click)="abrirShortcut(s)">
        <div class="shortcut-icon" [style.background-color]="s.color">
          <mat-icon>{{ s.icono }}</mat-icon>
        </div>
        <span class="shortcut-titulo">{{ s.titulo }}</span>
        <button mat-icon-button class="shortcut-delete" (click)="eliminarShortcut(s, $event)" matTooltip="Eliminar">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="dashboard-main-content">

    <div class="dashboard-col-left">
      <app-dash-chart-card
        title="Cotizaciones (30 dias)"
        icon="show_chart"
        [chartData]="chartData"
        [chartOptions]="chartOptions"
        chartType="line">
      </app-dash-chart-card>
    </div>

    <div class="dashboard-col-right">
      <div class="dashboard-card">
        <app-dash-section-header
          icon="point_of_sale"
          title="Cajas abiertas"
          [badge]="cajasAbiertasResumen.length"
          badgeColor="success">
        </app-dash-section-header>
        <mat-divider></mat-divider>

        <div *ngIf="!loading && cajasAbiertasResumen.length === 0" class="dashboard-empty-state">
          <mat-icon>info_outline</mat-icon>
          <span>No hay cajas abiertas</span>
        </div>

        <div class="dashboard-alert-list" *ngIf="cajasAbiertasResumen.length > 0">
          <div *ngFor="let c of cajasAbiertasResumen" class="dashboard-alert-item alert-success">
            <mat-icon>radio_button_checked</mat-icon>
            <div class="dashboard-alert-info">
              <span class="dashboard-alert-title">{{ c.cajero }}</span>
              <span class="dashboard-alert-detail">{{ c.dispositivo || 'Sin dispositivo' }} · Apertura {{ c.apertura | date:'dd/MM HH:mm' }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
