<div class="page">
  <mat-card>
    <mat-card-content>
      <div class="header">
        <div class="title"><mat-icon>group</mat-icon><h2>Equipos de Comisión</h2></div>
        <button mat-flat-button color="primary" (click)="abrirCreate()"><mat-icon>add</mat-icon> Nuevo equipo</button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <div *ngIf="loading" class="spinner-container"><mat-spinner diameter="40"></mat-spinner></div>
      <table mat-table [dataSource]="equipos" *ngIf="!loading" class="full-width">
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let e">{{ e.nombre }}</td>
        </ng-container>
        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let e">{{ e.descripcion }}</td>
        </ng-container>
        <ng-container matColumnDef="activo">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let e"><span [class]="e.activo ? 'chip-active' : 'chip-inactive'">{{ e.activo ? 'Activo' : 'Inactivo' }}</span></td>
        </ng-container>
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let e">
            <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon>more_vert</mat-icon></button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="abrirEdit(e)"><mat-icon>edit</mat-icon> Editar / Miembros</button>
              <button mat-menu-item (click)="eliminar(e)"><mat-icon>delete</mat-icon> Eliminar</button>
            </mat-menu>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <p *ngIf="!loading && equipos.length === 0" class="empty-state">No hay equipos de comisión registrados.</p>
    </mat-card-content>
  </mat-card>
</div>
