<div class="page">
  <mat-card>
    <mat-card-content>
      <div class="header">
        <div class="title">
          <mat-icon>percent</mat-icon>
          <h2>Reglas de Comisión</h2>
        </div>
        <button mat-flat-button color="primary" (click)="abrirCreate()">
          <mat-icon>add</mat-icon> Nueva regla
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <div *ngIf="loading" class="spinner-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="reglas" *ngIf="!loading" class="full-width">
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef>Tipo</th>
          <td mat-cell *matCellDef="let r">
            <mat-chip>{{ r.tipo }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="modoValidacion">
          <th mat-header-cell *matHeaderCellDef>Modo Validación</th>
          <td mat-cell *matCellDef="let r">{{ r.modoValidacion }}</td>
        </ng-container>

        <ng-container matColumnDef="esEquipo">
          <th mat-header-cell *matHeaderCellDef>Equipo</th>
          <td mat-cell *matCellDef="let r">
            <mat-icon *ngIf="r.esEquipo" color="accent">group</mat-icon>
            <mat-icon *ngIf="!r.esEquipo">person</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="activo">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let r">
            <span [class]="r.activo ? 'chip-active' : 'chip-inactive'">
              {{ r.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let r">
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="abrirEdit(r)">
                <mat-icon>edit</mat-icon> Editar
              </button>
              <button mat-menu-item (click)="abrirAsignarFuncionarios(r)" *ngIf="!r.esEquipo">
                <mat-icon>person_add</mat-icon> Asignar funcionarios
              </button>
              <button mat-menu-item (click)="eliminar(r)" class="text-danger">
                <mat-icon>delete</mat-icon> Eliminar
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <p *ngIf="!loading && reglas.length === 0" class="empty-state">
        No hay reglas de comisión registradas.
      </p>
    </mat-card-content>
  </mat-card>
</div>
