<div class="dashboard-container">

  <div class="dashboard-header">
    <div class="dashboard-header-title">
      <h1 class="dashboard-title">Productos</h1>
      <span class="dashboard-subtitle">Panel de control</span>
    </div>
    <div class="dashboard-header-actions">
      <button mat-icon-button (click)="cargarKpis()" [disabled]="loading" matTooltip="Actualizar">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>
  </div>

  <div class="dashboard-stats-row">
    <app-dash-stat-chip
      icon="restaurant"
      [value]="productosActivos"
      label="Productos activos"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="menu_book"
      [value]="recetasActivas"
      label="Recetas activas"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="money_off"
      color="warning"
      [value]="productosSinPrecio"
      label="Sin precio"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="warning"
      color="warning"
      [value]="productosParciales"
      label="Parciales (incompletos)"
      [loading]="loading">
    </app-dash-stat-chip>
  </div>

  <div class="dashboard-quick-actions">
    <app-dash-quick-action *ngFor="let a of quickActions"
      [icon]="a.icon"
      [title]="a.title"
      [color]="a.color"
      (action)="navigateTo(a.action)">
    </app-dash-quick-action>
  </div>

  <!-- 3 cards lado a lado: Top CMV + Mas vendidos + Productos parciales -->
  <div class="dashboard-rankings-row">
    <app-dash-ranking
      title="Top productos con mejor CMV"
      icon="trending_up"
      [items]="topCmv"
      emptyText="Sin productos con costo y precio configurados"
      (itemClick)="onRankingClick($event)">
    </app-dash-ranking>

    <app-dash-ranking
      title="Mas vendidos del mes"
      icon="emoji_events"
      [items]="topVendidos"
      emptyText="Sin ventas este mes"
      (itemClick)="onRankingClick($event)">
    </app-dash-ranking>

    <div class="dashboard-card">
      <app-dash-section-header
        icon="construction"
        title="Productos parciales"
        [badge]="productosParcialesLista.length"
        badgeColor="info">
      </app-dash-section-header>
      <mat-divider></mat-divider>

      <div *ngIf="!loading && productosParcialesLista.length === 0" class="dashboard-empty-state">
        <mat-icon>check_circle</mat-icon>
        <span>Todos los productos completos</span>
      </div>

      <div class="dashboard-alert-list" *ngIf="productosParcialesLista.length > 0">
        <div *ngFor="let p of productosParcialesLista" class="dashboard-alert-item alert-info"
             (click)="openProducto(p.id, p.nombre)" style="cursor: pointer;">
          <mat-icon>edit</mat-icon>
          <div class="dashboard-alert-info">
            <span class="dashboard-alert-title">{{ p.nombre }}</span>
            <span class="dashboard-alert-detail">Falta completar registro</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
