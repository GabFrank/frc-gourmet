<div class="familias-container">
  <div class="familias-wrapper">
    <div class="header-section">
      <div class="header-title">
        <mat-icon>category</mat-icon>
        <h3>Gestión de Familias de productos</h3>
      </div>
    </div>

    <!-- Filtros -->
    <mat-card class="filter-card">
      <form [formGroup]="filterForm" class="filter-grid">
        <mat-form-field appearance="outline" class="filter-field-name">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" placeholder="Buscar por nombre..." (keyup.enter)="buscar()" />
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="filter-field-status">
          <mat-label>Estado</mat-label>
          <mat-select formControlName="activo">
            <mat-option value="">TODOS</mat-option>
            <mat-option value="true">ACTIVOS</mat-option>
            <mat-option value="false">INACTIVOS</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="filter-actions">
          <button mat-raised-button color="primary" type="button" (click)="buscar()" [disabled]="isLoading">
            <mat-icon>search</mat-icon>
            <span>Buscar</span>
          </button>
          <button mat-stroked-button type="button" (click)="limpiarFiltros()" [disabled]="isLoading">
            <mat-icon>clear</mat-icon>
            <span>Limpiar</span>
          </button>
          <span class="spacer"></span>
          <button mat-raised-button color="accent" (click)="openCreateDialog()" matTooltip="Crear nueva familia">
            <mat-icon>add</mat-icon>
            <span>Nueva familia</span>
          </button>
        </div>
      </form>
    </mat-card>

    <div class="content-section">
      <mat-card class="table-card">
        <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>

        <div class="table-container">
          <table mat-table [dataSource]="dataSource" class="familias-table">
            <ng-container matColumnDef="nombre">
              <th mat-header-cell *matHeaderCellDef class="text-left" style="width: 50%;">Nombre</th>
              <td mat-cell *matCellDef="let familia" class="text-left" style="width: 50%;">{{ familia.nombre }}</td>
            </ng-container>

            <ng-container matColumnDef="activo">
              <th mat-header-cell *matHeaderCellDef class="text-center" style="width: 20%;">Estado</th>
              <td mat-cell *matCellDef="let familia" class="text-center" style="width: 20%;">
                <span class="status-badge" [ngClass]="{'active': familia.activo, 'inactive': !familia.activo}">
                  {{ familia.activo ? 'ACTIVO' : 'INACTIVO' }}
                </span>
              </td>
            </ng-container>

            <ng-container matColumnDef="createdAt">
              <th mat-header-cell *matHeaderCellDef class="text-center" style="width: 20%;">Fecha Creación</th>
              <td mat-cell *matCellDef="let familia" class="text-center" style="width: 20%;">
                {{ familia.createdAt | date:'dd/MM/yyyy HH:mm' }}
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-center">Acciones</th>
              <td mat-cell *matCellDef="let familia" class="text-center">
                <div class="actions-container">
                  <button mat-icon-button [matMenuTriggerFor]="menu">
                    <mat-icon>more_vert</mat-icon>
                  </button>
                  <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEditDialog(familia)">
                      <mat-icon>edit</mat-icon>
                      <span>Editar familia</span>
                    </button>
                    <button mat-menu-item (click)="toggleStatus(familia)">
                      <mat-icon [class]="familia.activo ? 'icon-danger' : 'icon-success'">
                        {{ familia.activo ? 'visibility_off' : 'visibility' }}
                      </mat-icon>
                      <span>{{ familia.activo ? 'Desactivar familia' : 'Activar familia' }}</span>
                    </button>
                    <button mat-menu-item (click)="deleteFamilia(familia)">
                      <mat-icon class="icon-danger">delete</mat-icon>
                      <span>Eliminar familia</span>
                    </button>
                  </mat-menu>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <div *ngIf="dataSource.data.length === 0 && !isLoading" class="no-data">
            <mat-icon>category</mat-icon>
            <p>No hay familias que coincidan con el filtro</p>
            <button mat-raised-button color="primary" (click)="openCreateDialog()">
              CREAR PRIMERA FAMILIA
            </button>
          </div>
        </div>

        <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
      </mat-card>
    </div>
  </div>
</div>
