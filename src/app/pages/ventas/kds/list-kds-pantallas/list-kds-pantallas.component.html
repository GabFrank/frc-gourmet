<div class="kds-pantallas-container">
  <div class="header">
    <h2>Pantallas KDS</h2>
    <button mat-flat-button color="primary" (click)="nueva()">
      <mat-icon>add</mat-icon> Nueva pantalla
    </button>
  </div>

  <div *ngIf="loading" class="loading"><mat-spinner diameter="36"></mat-spinner></div>

  <div *ngIf="!loading && pantallas.length === 0" class="empty">
    <mat-icon>tv</mat-icon>
    <p>No hay pantallas configuradas. Creá una para asignarle sectores.</p>
  </div>

  <table mat-table [dataSource]="pantallas" *ngIf="!loading && pantallas.length > 0" class="tabla">
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let p">{{ p.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="sectores">
      <th mat-header-cell *matHeaderCellDef>Sectores</th>
      <td mat-cell *matCellDef="let p">{{ p.sectoresResumen }}</td>
    </ng-container>

    <ng-container matColumnDef="umbrales">
      <th mat-header-cell *matHeaderCellDef>Semáforo (min)</th>
      <td mat-cell *matCellDef="let p">{{ p.umbralAmarillo }} / {{ p.umbralRojo }}</td>
    </ng-container>

    <ng-container matColumnDef="activo">
      <th mat-header-cell *matHeaderCellDef>Activa</th>
      <td mat-cell *matCellDef="let p">
        <mat-icon [style.color]="p.activo ? '#4caf50' : '#f44336'">
          {{ p.activo ? 'check_circle' : 'cancel' }}
        </mat-icon>
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button [matMenuTriggerFor]="menu" matTooltip="Acciones">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="editar(p)">
            <mat-icon>edit</mat-icon><span>Editar</span>
          </button>
          <button mat-menu-item (click)="eliminar(p)">
            <mat-icon color="warn">delete</mat-icon><span>Eliminar</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
