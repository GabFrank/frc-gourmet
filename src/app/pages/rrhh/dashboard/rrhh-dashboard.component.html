<div class="dashboard-container">

  <div class="dashboard-header">
    <div class="dashboard-header-title">
      <h1 class="dashboard-title">RRHH</h1>
      <span class="dashboard-subtitle">Panel de control</span>
    </div>
    <div class="dashboard-header-actions">
      <mat-form-field appearance="outline" class="periodo-selector">
        <mat-label>Periodo</mat-label>
        <mat-select [(ngModel)]="periodoSeleccionado" (ngModelChange)="onPeriodoCambiado()">
          <mat-option *ngFor="let p of periodosDisponibles" [value]="p">{{ p }}</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-icon-button (click)="cargarKpis()" [disabled]="loading" matTooltip="Actualizar">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>
  </div>

  <div class="dashboard-stats-row stats-6">
    <app-dash-stat-chip
      icon="payments"
      [value]="formatPYG(totalNominaMes) + ' Gs'"
      label="Nomina del mes"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="people"
      color="info"
      [value]="totalFuncionariosActivos"
      label="Funcionarios activos"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="fact_check"
      [color]="porcentajeAsistenciaMes >= 90 ? 'success' : porcentajeAsistenciaMes >= 70 ? 'warning' : 'error'"
      [value]="porcentajeAsistenciaMes + '%'"
      label="% Asistencia"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="receipt_long"
      [color]="valesPendientes > 0 ? 'warning' : 'success'"
      [value]="valesPendientes"
      label="Vales pendientes"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="account_balance"
      [color]="prestamosActivos > 0 ? 'warning' : 'success'"
      [value]="prestamosActivos"
      label="Prestamos activos"
      [loading]="loading">
    </app-dash-stat-chip>
    <app-dash-stat-chip
      icon="request_quote"
      [color]="liquidacionesPendientesPago > 0 ? 'error' : liquidacionesPendientesAprobacion > 0 ? 'warning' : 'success'"
      [value]="liquidacionesPendientesAprobacion + ' / ' + liquidacionesPendientesPago"
      label="Liq. (Apr/Pago)"
      [loading]="loading">
    </app-dash-stat-chip>
  </div>

  <div class="dashboard-quick-actions">
    <app-dash-quick-action *ngFor="let a of quickActions"
      [icon]="a.icon"
      [title]="a.title"
      [color]="a.color"
      (action)="navigateTo(a.action)">
    </app-dash-quick-action>
  </div>

  <div class="dashboard-main-content">

    <div class="dashboard-col-left">
      <app-dash-ranking
        title="Top 5 vendedores"
        icon="leaderboard"
        [items]="top5Vendedores"
        emptyText="Sin datos de ventas">
      </app-dash-ranking>
    </div>

    <div class="dashboard-col-right">
      <div class="dashboard-card">
        <app-dash-section-header
          icon="event"
          title="Proximos eventos"
          [badge]="proximosEventos.length">
        </app-dash-section-header>
        <mat-divider></mat-divider>

        <div *ngIf="!loading && proximosEventos.length === 0" class="dashboard-empty-state">
          <mat-icon>info_outline</mat-icon>
          <span>Sin eventos proximos</span>
        </div>

        <div class="dashboard-alert-list" *ngIf="proximosEventos.length > 0">
          <div *ngFor="let e of proximosEventos"
               class="dashboard-alert-item"
               [ngClass]="'alert-' + e.color">
            <mat-icon>{{ e.icon }}</mat-icon>
            <div class="dashboard-alert-info">
              <span class="dashboard-alert-title">{{ e.nombre }}</span>
              <span class="dashboard-alert-detail">{{ e.detalle }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
