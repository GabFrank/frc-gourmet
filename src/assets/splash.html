<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>FRC Gourmet</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }
    .splash {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      animation: fade-in 250ms ease-out;
      padding: 28px 36px;
      box-sizing: border-box;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes logo-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .logo {
      width: 100%;
      max-width: 380px;
      height: auto;
      animation: logo-in 420ms ease-out 80ms both;
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.15));
    }
    .label {
      font-size: 13px;
      color: rgba(0, 0, 0, 0.6);
      letter-spacing: 0.4px;
      animation: fade-in 600ms ease-out 280ms both;
    }
    .bar {
      width: 220px;
      height: 3px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .bar::before {
      content: "";
      position: absolute;
      left: -30%;
      top: 0;
      bottom: 0;
      width: 30%;
      background: #e50914;
      border-radius: 2px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0% { left: -30%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="images/logo/logo-light-md.png" alt="FRC Gourmet" />
    <div class="bar"></div>
    <div class="label">Cargando FRC Gourmet…</div>
  </div>
</body>
</html>
